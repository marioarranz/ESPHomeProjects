substitutions:
  name: "athom-smart-plug-v3"
  friendly_name: "Perro Guardian"
  room: "Living Room"
  device_description: "Perro Guardian"
  project_name: "MarioArranz.PerroGuardian"
  project_version: "v4.2.1"
  sensor_update_interval: "10s"
  current_limit: "16"
  dns_domain: ".local"
  timezone: "Europe/London"
  sntp_update_interval: "6h"
  sntp_server_1: "0.pool.ntp.org"
  sntp_server_2: "1.pool.ntp.org"
  sntp_server_3: "2.pool.ntp.org"
  wifi_fast_connect: "false"
  log_level: "INFO"
  ipv6_enable: "false"
  hide_energy_sensor: "false"
  early_pin_init: "true"
  power_plug_type: "power-socket-us"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  comment: "${device_description}"
  area: "${room}"
  name_add_mac_suffix: true
  min_version: 2024.6.0
  project:
    name: "${project_name}"
    version: "${project_version}"
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            id(internet_fail_count) = 0;
            id(check_target_index) = -1;

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

preferences:
  flash_write_interval: 5min

http_request:
  timeout: 10s
  verify_ssl: false

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: ${log_level}
  baud_rate: 0

web_server:
  port: 80

network:
  enable_ipv6: ${ipv6_enable}

wifi:
  ap: {}
  fast_connect: ${wifi_fast_connect}
  domain: "${dns_domain}"
  min_auth_mode: WPA2

mdns:
  disabled: false

captive_portal:

dashboard_import:
  package_import_url: github://marioarranz/ESPHomeProjects/version3/athom-smart-plug-v3.yaml

uart:
  rx_pin: GPIO20
  baud_rate: 4800
  parity: EVEN

globals:
  - id: total_energy
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: internet_fail_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: check_target_index
    type: int
    restore_value: no
    initial_value: '-1'

script:
  - id: connectivity_ok
    mode: restart
    then:
      - lambda: |-
          if (id(internet_fail_count) != 0) {
            ESP_LOGI("internet_check", "Conectividad recuperada. Reiniciando contador.");
          }
          id(internet_fail_count) = 0;

  - id: connectivity_fail
    mode: restart
    then:
      - lambda: |-
          id(internet_fail_count) += 1;
          ESP_LOGW("internet_check", "Fallo de conectividad. Contador=%d", id(internet_fail_count));
      - if:
          condition:
            lambda: |-
              return id(internet_fail_count) >= 5;
          then:
            - logger.log: "Sin internet 5 veces seguidas. Apagando relé y reiniciando en 1 minuto."
            - switch.turn_off: relay
            - delay: 1min
            - lambda: |-
                App.reboot();

  - id: check_google_204
    then:
      - http_request.get:
          url: http://clients3.google.com/generate_204
          on_response:
            then:
              - if:
                  condition:
                    lambda: return response->status_code == 204;
                  then:
                    - script.execute: connectivity_ok
                  else:
                    - script.execute: connectivity_fail
          on_error:
            then:
              - script.execute: connectivity_fail

  - id: check_gstatic_204
    then:
      - http_request.get:
          url: http://connectivitycheck.gstatic.com/generate_204
          on_response:
            then:
              - if:
                  condition:
                    lambda: return response->status_code == 204;
                  then:
                    - script.execute: connectivity_ok
                  else:
                    - script.execute: connectivity_fail
          on_error:
            then:
              - script.execute: connectivity_fail

  - id: check_cloudflare_204
    then:
      - http_request.get:
          url: http://cp.cloudflare.com/generate_204
          on_response:
            then:
              - if:
                  condition:
                    lambda: return response->status_code == 204;
                  then:
                    - script.execute: connectivity_ok
                  else:
                    - script.execute: connectivity_fail
          on_error:
            then:
              - script.execute: connectivity_fail

interval:
  - interval: 1min
    then:
      - if:
          condition:
            lambda: return id(uptime_sensor).state >= 300;
          then:
            - lambda: |-
                id(check_target_index) = (id(check_target_index) + 1) % 3;
            - if:
                condition:
                  lambda: return id(check_target_index) == 0;
                then:
                  - script.execute: check_google_204
                else:
                  - if:
                      condition:
                        lambda: return id(check_target_index) == 1;
                      then:
                        - script.execute: check_gstatic_204
                      else:
                        - script.execute: check_cloudflare_204

sensor:
  - platform: uptime
    id: uptime_sensor
    internal: true

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
    update_interval: ${sntp_update_interval}
    servers:
      - "${sntp_server_1}"
      - "${sntp_server_2}"
      - "${sntp_server_3}"
    on_time:
      - seconds: 0
        minutes: 0
        hours: 23
        days_of_week: MON
        then:
          - logger.log: "Reinicio semanal lunes 23:00"
          - switch.turn_off: relay
          - delay: 1min
          - lambda: App.reboot();

switch:
  - platform: gpio
    name: "Switch"
    pin: GPIO5
    id: relay
    restore_mode: ALWAYS_ON