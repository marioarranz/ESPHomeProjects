substitutions:
  name: "athom-smart-plug-v3"
  friendly_name: "Perro Guardian"
  room: "Living Room"
  device_description: "Perro Guardian"
  project_name: "MarioArranz.PerroGuardian"
  project_version: "v3.1.0"
  sensor_update_interval: "10s"
  current_limit: "16"
  dns_domain: ".local"
  timezone: "Europe/London"
  sntp_update_interval: "6h"
  sntp_server_1: "0.pool.ntp.org"
  sntp_server_2: "1.pool.ntp.org"
  sntp_server_3: "2.pool.ntp.org"
  wifi_fast_connect: "false"
  log_level: "INFO"
  ipv6_enable: "false"
  hide_energy_sensor: "false"
  power_plug_type: "power-socket-us"
  internet_check_interval: "60s"
  internet_fail_threshold: "3"
  power_cycle_off_time: "1min"
  max_recovery_attempts: "3"
  cooldown_cycles_after_max: "15"
  internet_test_dns_url: "http://clients3.google.com/generate_204"
  internet_test_ip_url: "https://1.1.1.1/cdn-cgi/trace"
  dashboard_repo: "marioarranz/ESPHomeProjects"
  dashboard_file: "athom-smart-plug-v3.yaml"
  dashboard_ref: "0b2df4b0f09cd6987fde2cc550be4713ac4a94e4"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  comment: "${device_description}"
  area: "${room}"
  name_add_mac_suffix: true
  min_version: 2024.6.0
  project:
    name: "${project_name}"
    version: "${project_version}"
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            id(internet_fail_count_dns) = 0;
            id(internet_fail_count_ip) = 0;
            id(startup_grace_remaining) = 3;
            id(check_dns_next) = true;

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

preferences:
  flash_write_interval: 5min

http_request:
  timeout: 5s
  verify_ssl: false

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: ${log_level}
  baud_rate: 0

web_server:
  port: 80

network:
  enable_ipv6: ${ipv6_enable}

wifi:
  ap: {}
  fast_connect: ${wifi_fast_connect}
  domain: "${dns_domain}"
  min_auth_mode: WPA2

mdns:
  disabled: false

captive_portal:

dashboard_import:
  package_import_url: github://${dashboard_repo}/${dashboard_file}@${dashboard_ref}

uart:
  rx_pin: GPIO20
  baud_rate: 4800
  parity: EVEN

globals:
  - id: total_energy
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: internet_fail_count_dns
    type: int
    restore_value: no
    initial_value: '0'

  - id: internet_fail_count_ip
    type: int
    restore_value: no
    initial_value: '0'

  - id: recovery_attempt_count
    type: int
    restore_value: yes
    initial_value: '0'

  - id: cooldown_cycles_remaining
    type: int
    restore_value: yes
    initial_value: '0'

  - id: startup_grace_remaining
    type: int
    restore_value: no
    initial_value: '0'

  - id: check_dns_next
    type: bool
    restore_value: no
    initial_value: 'true'

sensor:
  - platform: uptime
    name: "Uptime Sensor"
    id: uptime_sensor
    internal: true

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: |-
          return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"

  - platform: cse7766
    id: athom_cse7766

    current:
      name: "Current"
      id: plug_current
      filters:
        - throttle_average: ${sensor_update_interval}
        - lambda: |-
            if (x < 0.060) return 0.0;
            else return x;

    voltage:
      name: "Voltage"
      id: plug_voltage
      filters:
        - throttle_average: ${sensor_update_interval}

    power:
      name: "Power"
      id: power_sensor
      filters:
        - throttle_average: ${sensor_update_interval}
        - lambda: |-
            if (x < 3.0) return 0.0;
            else return x;

interval:
  - interval: ${internet_check_interval}
    then:
      - if:
          condition:
            lambda: |-
              return id(startup_grace_remaining) > 0;
          then:
            - lambda: |-
                id(startup_grace_remaining) -= 1;
                id(internet_fail_count_dns) = 0;
                id(internet_fail_count_ip) = 0;
                ESP_LOGW("internet_check", "Startup grace activo. Ciclos restantes=%d", id(startup_grace_remaining));
          else:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        lambda: |-
                          return id(check_dns_next);
                      then:
                        - http_request.get:
                            url: ${internet_test_dns_url}
                            on_response:
                              - lambda: |-
                                  id(internet_fail_count_dns) = 0;
                                  id(check_dns_next) = false;
                            on_error:
                              - lambda: |-
                                  id(internet_fail_count_dns) += 1;
                                  id(check_dns_next) = false;
                  - if:
                      condition:
                        lambda: |-
                          return !id(check_dns_next);
                      then:
                        - http_request.get:
                            url: ${internet_test_ip_url}
                            on_response:
                              - lambda: |-
                                  id(internet_fail_count_ip) = 0;
                                  id(check_dns_next) = true;
                            on_error:
                              - lambda: |-
                                  id(internet_fail_count_ip) += 1;
                                  id(check_dns_next) = true;

switch:
  - platform: gpio
    name: "Switch"
    pin: GPIO5
    id: relay
    restore_mode: ALWAYS_ON

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
    servers:
      - "${sntp_server_1}"
      - "${sntp_server_2}"
      - "${sntp_server_3}"