substitutions:
  name: "athom-smart-plug-v3"
  friendly_name: "Perro Guardian"
  room: "Living Room"
  device_description: "Perro Guardian"
  project_name: "MarioArranz.PerroGuardian"
  project_version: "v4.5.1"
  sensor_update_interval: "10s"
  current_limit: "16"
  dns_domain: ".local"
  timezone: "Europe/London"
  sntp_update_interval: "6h"
  sntp_server_1: "0.pool.ntp.org"
  sntp_server_2: "1.pool.ntp.org"
  sntp_server_3: "2.pool.ntp.org"
  wifi_fast_connect: "false"
  log_level: "INFO"
  ipv6_enable: "false"
  hide_energy_sensor: "false"
  early_pin_init: "true"
  power_plug_type: "power-socket-us"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  comment: "${device_description}"
  area: "${room}"
  name_add_mac_suffix: true
  min_version: 2024.6.0
  project:
    name: "${project_name}"
    version: "${project_version}"
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            id(internet_fail_count) = 0;
            id(recovery_in_progress) = false;
            id(post_recovery_grace_in_progress) = false;
            id(check_cycle_in_progress) = false;
            id(cycle_success_count) = 0;
            id(cycle_failure_count) = 0;

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

preferences:
  flash_write_interval: 5min

http_request:
  timeout: 10s
  verify_ssl: false

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: ${log_level}
  baud_rate: 0

web_server:
  port: 80

network:
  enable_ipv6: ${ipv6_enable}

wifi:
  ap: {}
  fast_connect: ${wifi_fast_connect}
  domain: "${dns_domain}"
  min_auth_mode: WPA2

mdns:
  disabled: false

captive_portal:

dashboard_import:
  package_import_url: github://marioarranz/ESPHomeProjects/version3/athom-smart-plug-v3.yaml

uart:
  rx_pin: GPIO20
  baud_rate: 4800
  parity: EVEN

globals:
  - id: total_energy
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: internet_fail_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: recovery_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: post_recovery_grace_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: check_cycle_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: cycle_success_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: cycle_failure_count
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: recovery_cycle
    mode: single
    then:
      - lambda: |-
          id(recovery_in_progress) = true;
          id(post_recovery_grace_in_progress) = false;
          id(check_cycle_in_progress) = false;
          id(cycle_success_count) = 0;
          id(cycle_failure_count) = 0;
          ESP_LOGW("internet_check", "Iniciando ciclo de recuperacion: apagando rele durante 1 minuto.");
      - switch.turn_off: relay
      - delay: 1min
      - lambda: |-
          ESP_LOGI("internet_check", "Minuto de apagado completado. Reiniciando el enchufe para restaurar el rele en ON.");
          App.reboot();

  - id: finalize_check_cycle
    mode: restart
    then:
      - lambda: |-
          id(check_cycle_in_progress) = false;
          ESP_LOGI(
            "internet_check",
            "Fin de ciclo de chequeo. Exitos=%d Fallos=%d",
            id(cycle_success_count),
            id(cycle_failure_count)
          );

          if (id(cycle_failure_count) >= 2) {
            id(internet_fail_count) += 1;
            ESP_LOGW(
              "internet_check",
              "Ciclo fallido (%d/4). Han fallado %d de 3 endpoints.",
              id(internet_fail_count),
              id(cycle_failure_count)
            );
          } else {
            if (id(internet_fail_count) != 0) {
              ESP_LOGI("internet_check", "Conectividad recuperada. Reiniciando contador de ciclos fallidos.");
            }
            id(internet_fail_count) = 0;
          }

          id(cycle_success_count) = 0;
          id(cycle_failure_count) = 0;
      - if:
          condition:
            lambda: |-
              return id(internet_fail_count) >= 4 && !id(recovery_in_progress) && !id(post_recovery_grace_in_progress);
          then:
            - logger.log: "Sin internet en 4 ciclos consecutivos (2 de 3 fallidos). Iniciando reciclaje de corriente."
            - script.execute: recovery_cycle

  - id: check_google_204
    mode: restart
    then:
      - http_request.get:
          url: http://clients3.google.com/generate_204
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 204) {
                    id(cycle_success_count) += 1;
                    ESP_LOGI("internet_check", "Google OK con HTTP %d.", response->status_code);
                  } else {
                    id(cycle_failure_count) += 1;
                    ESP_LOGW("internet_check", "Google fallo con HTTP %d.", response->status_code);
                  }
              - script.execute: check_gstatic_204
          on_error:
            then:
              - lambda: |-
                  id(cycle_failure_count) += 1;
                  ESP_LOGW("internet_check", "Google no accesible.");
              - script.execute: check_gstatic_204

  - id: check_gstatic_204
    mode: restart
    then:
      - http_request.get:
          url: http://connectivitycheck.gstatic.com/generate_204
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 204) {
                    id(cycle_success_count) += 1;
                    ESP_LOGI("internet_check", "Gstatic OK con HTTP %d.", response->status_code);
                  } else {
                    id(cycle_failure_count) += 1;
                    ESP_LOGW("internet_check", "Gstatic fallo con HTTP %d.", response->status_code);
                  }
              - script.execute: check_cloudflare_204
          on_error:
            then:
              - lambda: |-
                  id(cycle_failure_count) += 1;
                  ESP_LOGW("internet_check", "Gstatic no accesible.");
              - script.execute: check_cloudflare_204

  - id: check_cloudflare_204
    mode: restart
    then:
      - http_request.get:
          url: http://cp.cloudflare.com/generate_204
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 204) {
                    id(cycle_success_count) += 1;
                    ESP_LOGI("internet_check", "Cloudflare OK con HTTP %d.", response->status_code);
                  } else {
                    id(cycle_failure_count) += 1;
                    ESP_LOGW("internet_check", "Cloudflare fallo con HTTP %d.", response->status_code);
                  }
              - script.execute: finalize_check_cycle
          on_error:
            then:
              - lambda: |-
                  id(cycle_failure_count) += 1;
                  ESP_LOGW("internet_check", "Cloudflare no accesible.");
              - script.execute: finalize_check_cycle

  - id: start_check_cycle
    mode: single
    then:
      - lambda: |-
          id(check_cycle_in_progress) = true;
          id(cycle_success_count) = 0;
          id(cycle_failure_count) = 0;
          ESP_LOGI("internet_check", "Iniciando ciclo de chequeo de 3 endpoints.");
      - script.execute: check_google_204

interval:
  - interval: 30s
    then:
      - if:
          condition:
            lambda: |-
              return id(recovery_in_progress);
          then:
            - logger.log: "Ciclo de recuperacion en progreso. Omitiendo chequeos de conectividad."
          else:
            - if:
                condition:
                  lambda: |-
                    return id(post_recovery_grace_in_progress);
                then:
                  - logger.log: "Ventana de gracia post-recovery activa. Omitiendo chequeos de conectividad."
                else:
                  - if:
                      condition:
                        lambda: |-
                          return id(check_cycle_in_progress);
                      then:
                        - logger.log: "Ya hay un ciclo de chequeo en progreso. Omitiendo este tick."
                      else:
                        - if:
                            condition:
                              lambda: |-
                                return id(uptime_sensor).state >= 300;
                            then:
                              - script.execute: start_check_cycle
                            else:
                              - logger.log:
                                  format: "Ventana de gracia de arranque activa (%d s). Omitiendo chequeos de conectividad."
                                  args:
                                    - (int) id(uptime_sensor).state

binary_sensor:
  - platform: status
    name: "Status"
    icon: mdi:check-network-outline
    entity_category: diagnostic

  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    id: power_button
    name: "Power Button"
    disabled_by_default: true
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
          - switch.toggle: relay
      - timing:
          - ON for at least 4s
        then:
          - button.press: Reset

sensor:
  - platform: uptime
    name: "Uptime Sensor"
    id: uptime_sensor
    entity_category: diagnostic
    internal: true

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: |-
          return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: diagnostic
    device_class: ""

  - platform: cse7766
    id: athom_cse7766

    current:
      name: "Current"
      id: plug_current
      icon: mdi:current-ac
      filters:
        - throttle_average: ${sensor_update_interval}
        - lambda: |-
            if (x < 0.060) return 0.0;
            else return x;
      on_value_range:
        - above: ${current_limit}
          then:
            - switch.turn_off: relay

    voltage:
      name: "Voltage"
      id: plug_voltage
      icon: mdi:sine-wave
      filters:
        - throttle_average: ${sensor_update_interval}

    power:
      name: "Power"
      id: power_sensor
      icon: mdi:power
      filters:
        - throttle_average: ${sensor_update_interval}
        - lambda: |-
            if (x < 3.0) return 0.0;
            else return x;

    energy:
      name: "Energy"
      id: energy
      icon: mdi:lightning-bolt
      unit_of_measurement: kWh
      internal: ${hide_energy_sensor}
      filters:
        - throttle: ${sensor_update_interval}
        - multiply: 0.001
      on_value:
        then:
          - lambda: |-
              static float previous_energy_value = 0.0;
              float current_energy_value = id(energy).state;
              float delta = current_energy_value - previous_energy_value;

              if (delta >= 0.0) {
                id(total_energy) += delta;
              }

              previous_energy_value = current_energy_value;
              id(total_energy_sensor).update();

    apparent_power:
      name: "Apparent Power"
      icon: mdi:power
      filters:
        - throttle_average: ${sensor_update_interval}

    reactive_power:
      name: "Reactive Power"
      icon: mdi:flash
      filters:
        - throttle_average: ${sensor_update_interval}

    power_factor:
      name: "Power Factor"
      icon: mdi:percent-outline
      filters:
        - throttle_average: ${sensor_update_interval}

  - platform: template
    name: "Total Energy"
    id: total_energy_sensor
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    icon: mdi:lightning-bolt
    accuracy_decimals: 3
    lambda: |-
      return id(total_energy);
    update_interval: ${sensor_update_interval}

  - platform: total_daily_energy
    name: "Total Energy Since Boot"
    restore: true
    power_id: power_sensor
    unit_of_measurement: kWh
    icon: mdi:hours-24
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

button:
  - platform: restart
    name: "Restart"
    entity_category: config

  - platform: factory_reset
    name: "Factory Reset"
    id: Reset
    entity_category: config

  - platform: safe_mode
    name: "Safe Mode"
    internal: false
    entity_category: config

switch:
  - platform: gpio
    name: "Switch"
    pin: GPIO5
    id: relay
    restore_mode: ALWAYS_ON
    icon: mdi:${power_plug_type}

light:
  - platform: status_led
    name: "Status LED"
    id: blue_led
    icon: mdi:lightbulb-outline
    disabled_by_default: true
    pin:
      number: GPIO6
      inverted: true

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      icon: mdi:ip-network
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      icon: mdi:wifi-strength-2
      entity_category: diagnostic
    mac_address:
      name: "Mac Address"
      icon: mdi:network-pos
      entity_category: diagnostic

  - platform: template
    name: "Last Restart"
    id: device_last_restart
    icon: mdi:clock
    entity_category: diagnostic

  - platform: template
    name: "Uptime"
    entity_category: diagnostic
    lambda: |-
      int seconds = (int) id(uptime_sensor).state;
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600);
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds / 60;
      seconds = seconds % 60;

      char buffer[32];

      if (days > 3650) {
        return std::string("Starting up");
      } else if (days) {
        snprintf(buffer, sizeof(buffer), "%dd %dh %dm %ds", days, hours, minutes, seconds);
        return {buffer};
      } else if (hours) {
        snprintf(buffer, sizeof(buffer), "%dh %dm %ds", hours, minutes, seconds);
        return {buffer};
      } else if (minutes) {
        snprintf(buffer, sizeof(buffer), "%dm %ds", minutes, seconds);
        return {buffer};
      } else {
        snprintf(buffer, sizeof(buffer), "%ds", seconds);
        return {buffer};
      }
    icon: mdi:clock-start

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
    update_interval: ${sntp_update_interval}
    servers:
      - "${sntp_server_1}"
      - "${sntp_server_2}"
      - "${sntp_server_3}"
    on_time_sync:
      then:
        - if:
            condition:
              lambda: |-
                return id(device_last_restart).state == "";
            then:
              - text_sensor.template.publish:
                  id: device_last_restart
                  state: !lambda |-
                    return id(sntp_time).now().strftime("%a %d %b %Y - %I:%M:%S %p");
    on_time:
      - seconds: 0
        minutes: 0
        hours: 23
        days_of_week: MON
        then:
          - logger.log: "Reinicio programado semanal: lunes 23:00."
          - switch.turn_off: relay
          - delay: 1min
          - lambda: |-
              ESP_LOGI("internet_check", "Minuto de apagado semanal completado. Reiniciando el enchufe para restaurar el rele en ON.");
              App.reboot();